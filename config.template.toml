default_provider = "__LLM_PROVIDER__"
default_model = "__LLM_MODEL__"
default_temperature = 0.7
provider_timeout_secs = 120

[channels_config]
cli = true

[channels_config.telegram]
bot_token = "__TELEGRAM_BOT_TOKEN__"
allowed_users = ["__TELEGRAM_USER_ID__"]
stream_mode = "partial"
mention_only = false
interrupt_on_new_message = true

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = ["curl", "wget", "git", "ls", "cat", "echo", "date", "node", "npx"]
forbidden_paths = ["/etc/shadow", "/etc/passwd", "/root", "/proc", "/sys"]
allowed_roots = []
max_actions_per_hour = 100
max_cost_per_day_cents = 500
block_high_risk_commands = true
auto_approve = ["web_search_tool", "web_fetch", "browser", "memory_store", "memory_recall", "file_read"]

[security.sandbox]
enabled = false

[memory]
backend = "sqlite"
auto_save = true

[browser]
enabled = true
backend = "agent_browser"
native_headless = true
allowed_domains = ["*"]

[web_search]
enabled = true
provider = "duckduckgo"

[web_fetch]
enabled = true
timeout_secs = 30
max_response_size = 500000
allowed_domains = ["*"]

[agent]
max_tool_iterations = 50

[gateway]
port = 42617
host = "0.0.0.0"
require_pairing = false
allow_public_bind = true

[cron]
enabled = false
